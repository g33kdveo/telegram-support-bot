<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #fff);
            --text-color: var(--tg-theme-text-color, #000);
            --hint-color: var(--tg-theme-hint-color, #999);
            --button-color: var(--tg-theme-button-color, #3390ec);
            --button-text-color: var(--tg-theme-button-text-color, #fff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
            --destructive: #ff3b30;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 80px;
        }

        .container {
            padding: 10px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Categories */
        .category-section {
            margin-bottom: 25px;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid var(--secondary-bg);
        }

        .category-title {
            font-size: 20px;
            font-weight: 700;
        }

        /* Products */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        @media (min-width: 600px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (min-width: 900px) {
            .products-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .sticky-header {
            position: sticky;
            top: 0;
            background: var(--bg-color);
            z-index: 100;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--secondary-bg);
        }

        .product-card {
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
            border: 1px solid var(--secondary-bg);
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            padding: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: transform 0.1s ease-in-out;
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .product-card.hidden-item {
            opacity: 0.6;
            background: repeating-linear-gradient(
                45deg,
                var(--bg-color),
                var(--bg-color) 10px,
                var(--secondary-bg) 10px,
                var(--secondary-bg) 20px
            );
        }

        /* New Card Layout Elements */
        .pc-brand {
            font-size: 12px;
            font-weight: 700;
            color: var(--button-color);
            margin-bottom: 4px;
            align-self: flex-start;
            z-index: 2;
        }

        .pc-name {
            font-size: 14px;
            font-weight: 700;
            text-align: left;
            margin-bottom: 4px;
            line-height: 1.3;
            width: 100%;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .pc-meta {
            font-size: 11px;
            color: var(--hint-color);
            align-self: flex-start;
            margin-bottom: 8px;
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1;
            height: auto;
            object-fit: contain;
            border-radius: 8px;
            background-color: var(--secondary-bg);
            margin-bottom: 8px;
        }

        .pc-footer {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-color);
            align-self: flex-start;
            margin-top: auto;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-color);
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            padding: 20px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-color);
            z-index: 2;
        }

        .modal-img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .modal-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
            padding-right: 30px;
        }

        .modal-desc {
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-wrap;
            color: var(--text-color);
        }

        /* Admin Controls */
        .admin-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--secondary-bg);
            padding: 15px;
            border-top: 1px solid #ccc;
            display: none; /* Hidden by default */
            justify-content: center;
            z-index: 900;
        }

        .admin-btn {
            background-color: var(--button-color);
            color: var(--button-text-color);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .admin-overlay {
            position: absolute;
            top: 10px;
            right: 0;
            display: none; /* Hidden by default */
            gap: 5px;
        }

        .btn-hide {
            background: var(--destructive);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        .btn-edit-cat {
            background: var(--button-color);
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 10px;
        }

        /* Admin Mode Active State */
        body.admin-mode .admin-bar { display: flex; }
        body.admin-mode .admin-overlay { display: flex; }

        /* Category Tabs */
        .category-nav {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 10px 0;
            -webkit-overflow-scrolling: touch; /* For momentum scrolling on iOS */
        }
        /* Custom Scrollbar for PC */
        .category-nav::-webkit-scrollbar {
            height: 6px;
        }
        .category-nav::-webkit-scrollbar-thumb {
            background: var(--hint-color);
            border-radius: 3px;
        }
        
        .category-tab {
            padding: 8px 16px;
            background: var(--secondary-bg);
            border-radius: 20px;
            white-space: nowrap;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            border: 1px solid transparent;
        }
        
        .category-tab.active {
            background: var(--button-color);
            color: var(--button-text-color);
        }

        /* Active Filters */
        .active-filters {
            display: flex;
            gap: 10px;
            padding: 5px 0 10px 0;
            flex-wrap: wrap;
        }
        .active-filters:empty {
            display: none;
            padding: 0;
        }
        .filter-tag {
            background: var(--button-color);
            color: var(--button-text-color);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .filter-tag span {
            cursor: pointer;
            font-weight: bold;
            margin-left: 5px;
        }

        /* Modal Brand & Variants */
        .brand-link {
            color: var(--button-color);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .variant-section {
            margin-top: 15px;
            border-top: 1px solid var(--secondary-bg);
            padding-top: 15px;
        }
        .variant-label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--hint-color);
        }
        .variant-select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--secondary-bg);
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
        }

        /* Search Bar */
        .search-wrapper {
            padding: 10px 0;
        }
        
        #search-input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid var(--secondary-bg);
            background: var(--secondary-bg);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sticky-header">
        <div class="search-wrapper">
            <input type="text" id="search-input" placeholder="🔍 Search products..." oninput="handleSearch()">
        </div>
        <div id="category-nav" class="category-nav"></div>
        <div id="active-filters" class="active-filters"></div>
    </div>

    <div id="main-container">
        <div style="text-align: center; padding: 40px; color: var(--hint-color);">Loading menu...</div>
    </div>
</div>

<!-- Detail Modal -->
<div id="detail-modal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="modal-body"></div>
    </div>
</div>

<!-- Admin Save Bar -->
<div class="admin-bar">
    <button class="admin-btn" onclick="saveAdminSettings()">💾 Save Changes</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // CONFIG
    const API_URL = "/api/products";
    const BASE_IMG_URL = "https://chadsflooring.bz";

    const CATEGORIES = ["Accessories", "In-House", "Carts", "Concentrates", "Disposables", "Edibles", "Flower", "Pre-rolls"];

    // STATE
    let rawData = [];
    let settings = { h: [], r: {} }; // h = hidden IDs, r = renames { "Old Name": "New Name" }
    let isAdmin = false;
    let currentImgPrefix = "";
    let selectedCategory = CATEGORIES[0];
    let selectedBrand = null;

    document.addEventListener('DOMContentLoaded', async () => {
        // 1. Parse URL Params for Admin Status & Settings
        const urlParams = new URLSearchParams(window.location.search);
        
        if (urlParams.get('admin') === '1') {
            isAdmin = true;
            document.body.classList.add('admin-mode');
        }

        const configStr = urlParams.get('settings');
        if (configStr) {
            try {
                settings = JSON.parse(decodeURIComponent(configStr));
                if (!settings.h) settings.h = [];
                if (!settings.r) settings.r = {};
            } catch (e) {
                console.error("Failed to parse settings", e);
            }
        }

        // 2. Fetch Data
        await fetchData();
    });

    async function fetchData() {
        try {
            // Add timestamp to prevent caching
            const response = await fetch(API_URL + "?t=" + new Date().getTime());
            const json = await response.json();
            
            // Get dynamic prefix from JSON, fallback if missing
            currentImgPrefix = json.imagePathPrefix || "/uploads/products/";
            
            rawData = json.data || [];
            preprocessData();
            renderCategories();
            render();
        } catch (e) {
            console.error(e);
            document.getElementById('main-container').innerHTML = `<div style="text-align:center; margin-top:50px;">Failed to load menu.<br>Please try again later.</div>`;
        }
    }

    function preprocessData() {
        // Filter out unwanted categories
        const banned = ["Merch", "Munchies", "Topical"];
        rawData = rawData.filter(g => !banned.includes(g.cat));

        rawData.forEach(group => {
            // 1. Rename Category "BYOB" -> "In-House"
            if (group.cat === "BYOB") group.cat = "In-House";

            // 2. Rename Brand "In-house" -> "Value"
            if (group.brand && group.brand.toLowerCase() === "in-house") {
                group.brand = "Value";
                
                // 3. Move "Flower" under "Value" (was In-house) to "In-House" Category
                if (group.cat === "Flower") {
                    group.cat = "In-House";
                }
            }
        });
    }

    function handleSearch() {
        render();
    }

    function selectCategory(cat) {
        selectedCategory = cat;
        renderCategories();
        render();
    }

    function selectBrand(brand) {
        selectedBrand = brand;
        closeModal();
        render();
    }

    function clearBrand() {
        selectedBrand = null;
        render();
    }

    function renderCategories() {
        const nav = document.getElementById('category-nav');
        let html = '';
        CATEGORIES.forEach(cat => {
            html += `<div class="category-tab ${selectedCategory === cat ? 'active' : ''}" onclick="selectCategory('${cat}')">${cat}</div>`;
        });
        nav.innerHTML = html;
    }

    // Helper to extract info from name/desc
    function parseProductInfo(group) {
        const name = group.name;
        const desc = group.desc;
        
        // Combine text from name, desc, and ALL variants to find volume info
        const variantNames = (group.products || []).map(p => p.name).join(" ");
        const text = (name + " " + variantNames + " " + (desc || "")).toLowerCase();
        
        // Expanded Formulation Keywords - Ordered by specificity (longest first)
        const forms = [
            "liquid diamonds", "live resin", "live rosin", "cured resin", "cured rosin", 
            "distillate", "diamonds", "sauce", "badder", "budder", "batter", 
            "crumble", "shatter", "sugar", "kief", "hash", "moonrock", "wax", 
            "resin", "rosin", "isolate", "terp sauce", "thca", "delta-8", "delta-9", "hhc",
            "flower", "pre-roll", "preroll", "infused pre-roll", "infused preroll", "blunt",
            "edible", "gummy", "gummies", "chocolate", "brownie", "cookie", "capsule", "tincture", "syrup",
            "vape", "cartridge", "cart", "pod", "disposable", "battery", "accessory", "syringe", "topical", "lotion", "balm"
        ];
        
        // Find the first matching formulation
        let formulation = forms.find(f => text.includes(f));
        
        // Fallback to category name if no formulation found
        if (!formulation) {
             formulation = group.cat;
        }
        
        // Ensure we don't return "Product" as the formulation
        if (formulation && formulation.toLowerCase() === 'product') {
            formulation = (group.cat && group.cat !== 'Product') ? group.cat : '';
        }
        
        // Normalize Formulation Display
        if (formulation) {
            const formMap = {
                "cart": "Cartridge",
                "preroll": "Pre-roll",
                "infused preroll": "Infused Pre-roll",
                "thca": "THCa",
                "hhc": "HHC"
            };
            if (formMap[formulation.toLowerCase()]) formulation = formMap[formulation.toLowerCase()];
        }
        
        let volume = "";

        // Value Brand Rules
        if (group.brand === "Value") {
             if (name.toLowerCase().includes("terpene bottle")) {
                 volume = "";
             } else if (name.toLowerCase().includes("white label distillate")) {
                 volume = "1g";
             } else if (name.toLowerCase().includes("superdope")) {
                 volume = "Eighths";
             } else if (group.cat === "In-House" || group.cat === "Flower") {
                 if (name.toLowerCase().includes("bulk")) {
                     volume = "Full Pound";
                 } else {
                     volume = "Ounce";
                 }
             }
        }

        if (!volume) {
            // Specific Breakdowns/Volumes (Expanded to capture variations like 0.5g, 1.0g, etc.)
            // Added: zip, qp, hp, unit, pack, piece, count
            const volRegex = /\b(full pound|half pound|quarter pound|half ounce|quarter ounce|eighths?|ounce|oz|pound|lb|zip|qp|hp|unit|gram|(\d+(\.\d+)?|\d\/\d)\s*(g|gram|grams|oz|ounce|ounces|lb|pound|pounds|ml|mg|kg|l|pc|piece|pieces|pack|count))\b/i;
            const volMatch = text.match(volRegex);
            volume = volMatch ? volMatch[0] : "";
        }

        if (volume) {
            // Normalize volume text
            let vLower = volume.toLowerCase();
            const volMap = {
                "qp": "Quarter Pound",
                "hp": "Half Pound",
                "zip": "Ounce",
                "unit": "Pound",
                "oz": "Ounce",
                "lb": "Pound"
            };
            
            if (volMap[vLower]) {
                volume = volMap[vLower];
            } else {
                volume = vLower.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            }
        }

        return { 
            formulation: formulation ? (formulation.charAt(0).toUpperCase() + formulation.slice(1)) : "", 
            volume: volume 
        };
    }

    function render() {
        const container = document.getElementById('main-container');
        const filtersContainer = document.getElementById('active-filters');
        const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
        
        container.innerHTML = '';
        filtersContainer.innerHTML = '';

        // Render Active Filters
        if (selectedBrand) {
            filtersContainer.innerHTML = `<div class="filter-tag">Brand: ${selectedBrand} <span onclick="clearBrand()">✕</span></div>`;
        }

        const grid = document.createElement('div');
        grid.className = 'products-grid';
        let visibleCount = 0;

        // Iterate through all product groups (rawData is an array of groups)
        rawData.forEach(group => {
            // 1. Filter by Category
            // The API 'cat' field might be null or match one of our categories
            // We check if the group.cat matches selectedCategory
            if (selectedCategory !== 'All' && group.cat !== selectedCategory) {
                return;
            }

            // 2. Filter by Brand
            if (selectedBrand && group.brand !== selectedBrand) {
                return;
            }

            // 3. Stock & Variant Logic
            // Filter out out-of-stock variants
            const variants = group.products || [];
            const inStockVariants = variants.filter(p => p.qty > 0);
            
            // Calculate total stock for the group
            let totalStock = 0;
            inStockVariants.forEach(p => totalStock += p.qty);

            // Hide if out of stock (unless admin)
            if (totalStock <= 0 && !isAdmin) return;

            // 4. Search Filter (Check group name or any variant name)
            if (searchTerm) {
                const brandName = (group.brand || "").toLowerCase();
                const matchGroup = group.name.toLowerCase().includes(searchTerm);
                const matchVariant = variants.some(v => v.name.toLowerCase().includes(searchTerm));
                const matchBrand = brandName.includes(searchTerm);
                if (!matchGroup && !matchVariant && !matchBrand) return;
            }

            // 5. Info Extraction
            const info = parseProductInfo(group);
            const brandName = group.brand || "Geekd";
            const optionsCount = inStockVariants.length;
            
            // Image Logic (Use first available)
            let imgUrl = '';
            let rawImg = '';
            if (group.imgs) {
                const firstKey = Object.keys(group.imgs)[0];
                if (firstKey) rawImg = group.imgs[firstKey];
            } else if (variants.length > 0 && variants[0].images && variants[0].images[0]) {
                rawImg = variants[0].images[0];
            }
            
            if (rawImg) {
                imgUrl = BASE_IMG_URL + currentImgPrefix + rawImg.replace('x_imgvariantsize', '250');
            }

            visibleCount++;

            const card = document.createElement('div');
            // Use group ID for hiding logic if possible, or just first variant ID for now since we grouped them
            const groupId = variants.length > 0 ? variants[0].id : 0; 
            const isHidden = settings.h.includes(groupId);
            
            card.className = `product-card ${isHidden ? 'hidden-item' : ''}`;
            card.onclick = (e) => {
                if (e.target.closest('.admin-overlay') || e.target.closest('.pc-brand')) return;
                openModal(group, inStockVariants);
            };

            card.innerHTML = `
                <div class="pc-brand" onclick="event.stopPropagation(); selectBrand('${brandName.replace(/'/g, "\\'")}')">${brandName}</div>
                <div class="pc-name">${group.name}</div>
                <div class="pc-meta">${info.formulation} • ${optionsCount} options</div>
                <img src="${imgUrl}" class="product-image" onerror="this.style.display='none'" loading="lazy">
                <div class="pc-footer">${totalStock} left${info.volume ? ' • ' + info.volume : ''}</div>
                ${isAdmin ? `
                    <div class="admin-overlay">
                        <button class="btn-hide" onclick="toggleHide(${groupId})">
                            ${isHidden ? '👁️ Unhide' : '🚫 Hide'}
                        </button>
                    </div>
                ` : ''}
            `;
            grid.appendChild(card);
        });

        if (visibleCount > 0) {
            container.appendChild(grid);
        }

        if (container.innerHTML === '') {
             container.innerHTML = `<div style="text-align:center; padding: 20px; color: var(--hint-color)">No products found.</div>`;
        }
    }

    // --- MODAL LOGIC ---
    function openModal(group, variants) {
        const modal = document.getElementById('detail-modal');
        const body = document.getElementById('modal-body');
        
        // Use the first variant as the default display
        const defaultVariant = variants.length > 0 ? variants[0] : {};
        const info = parseProductInfo(group);

        let imagesHtml = '';
        let imageSources = [];

        // Collect images from group first, then variants
        if (group.imgs) {
            imageSources = Object.values(group.imgs);
        }
        // Add variant images if not already present (simple check)
        variants.forEach(v => {
            if (v.images && v.images.length > 0) {
                v.images.forEach(img => {
                    if (!imageSources.includes(img)) imageSources.push(img);
                });
            }
        });

        if (imageSources.length > 0) {
            imageSources.forEach(img => {
                const src = BASE_IMG_URL + currentImgPrefix + img.replace('x_imgvariantsize', '750'); // Use a larger size for the modal
                imagesHtml += `<img src="${src}" class="modal-img" onerror="this.style.display='none'">`;
            });
        }

        const brandName = group.brand || "Geekd";
        let brandHtml = `<div class="brand-link" onclick="selectBrand('${brandName.replace(/'/g, "\\'")}')">Brand: ${brandName}</div>`;

        // Variants Dropdown
        let variantsHtml = '';
        if (variants.length > 0) {
            let options = '';
            variants.forEach(p => {
                // Try to extract just the flavor name if possible, otherwise use full name
                // Often name is "Product - Flavor". 
                let flavorName = p.name.replace(group.name, "").replace(/^-/, "").trim();
                if (!flavorName) flavorName = "Standard";
                
                options += `<option value="${p.id}">${flavorName} (${p.qty} left)</option>`;
            });
            
            variantsHtml = `
                <div class="variant-section">
                    <div class="variant-label">Select Option:</div>
                    <select class="variant-select">
                        ${options}
                    </select>
                </div>
            `;
        }

        body.innerHTML = `
            <div class="modal-title">${group.name}</div>
            ${brandHtml}
            <div style="margin-bottom:10px; font-weight:600; color:var(--hint-color)">${info.volume}</div>
            ${imagesHtml}
            <div class="modal-desc">${group.desc || 'No description available.'}</div>
            ${variantsHtml}
        `;
        modal.style.display = 'flex';
    }

    function closeModal(e) {
        if (!e || e.target.id === 'detail-modal' || e.target.classList.contains('close-modal')) {
            document.getElementById('detail-modal').style.display = 'none';
        }
    }

    // --- ADMIN LOGIC ---
    function toggleHide(id) {
        const idx = settings.h.indexOf(id);
        if (idx > -1) {
            settings.h.splice(idx, 1); // Unhide
        } else {
            settings.h.push(id); // Hide
        }
        // Re-render to show visual change. 
        // Note: We need to re-fetch or store rawData globally.

    function editCategory(originalName) {
        const currentName = settings.r[originalName] || originalName;
        const newName = prompt("Rename Category:", currentName);
        
        if (newName !== null) {
            if (newName === originalName) {
                delete settings.r[originalName];
            } else {
                settings.r[originalName] = newName;
            }
            fetchData(); // Re-render
        }
    }

    function saveAdminSettings() {
        // Send settings back to Bot
        const data = {
            action: "save_settings",
            settings: settings
        };
        tg.sendData(JSON.stringify(data));
        tg.close();
    }
